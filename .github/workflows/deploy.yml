name: Build and deploy

on:
  push:
    branches:
      - master

env:
  IMAGE: ghcr.io/akokkalis/cardet-events
  PROJECT_DIR: Cardet Events Project Django/event_management
  REMOTE_DIR: /opt/cardet-events

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.PROJECT_DIR }}
          file: ${{ env.PROJECT_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Package deploy config files
        run: |
          cp "${{ env.PROJECT_DIR }}/docker-compose.prod.yml" docker-compose.yml
          mkdir -p nginx
          cp "${{ env.PROJECT_DIR }}/nginx/default.conf" nginx/default.conf
          tar -czf deploy-files.tar.gz docker-compose.yml nginx/default.conf

      - name: Copy config files to droplet
        run: |
          scp -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            deploy-files.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.REMOTE_DIR }}/deploy-files.tar.gz"

      - name: Deploy on droplet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "GH_TOKEN='$GH_TOKEN' GH_ACTOR='$GH_ACTOR' bash -s" <<'EOF'
              set -euo pipefail
              cd /opt/cardet-events
              tar -xzf deploy-files.tar.gz
              rm -f deploy-files.tar.gz
              echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
              docker compose pull
              docker compose up -d --remove-orphans
              docker compose exec -T django python manage.py migrate --noinput
              docker image prune -f
          EOF
