services:
  django:
    image: ghcr.io/akokkalis/cardet-events:latest
    container_name: event_management
    command: gunicorn event_management.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout 60 --max-requests 1000 --max-requests-jitter 100 --access-logfile -
    volumes:
      - ./media:/app/media
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  celery:
    image: ghcr.io/akokkalis/cardet-events:latest
    container_name: celery_worker
    command: celery -A event_management worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    volumes:
      - ./media:/app/media
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  celery_beat:
    image: ghcr.io/akokkalis/cardet-events:latest
    container_name: celery_beat
    command: celery -A event_management beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  flower:
    image: ghcr.io/akokkalis/cardet-events:latest
    container_name: flower
    command: celery -A event_management flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  gotenberg:
    image: thecodingmachine/gotenberg:7
    container_name: gotenberg
    restart: always

  nginx:
    image: nginx:1.25
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./media:/media
    depends_on:
      - django
    restart: always
