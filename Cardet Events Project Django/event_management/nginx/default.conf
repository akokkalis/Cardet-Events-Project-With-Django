# This block handles the Certbot challenge and redirects all other HTTP traffic to HTTPS.
server {
    listen 80;
    server_name qrscanner.innovedu.com;
    server_tokens off;

    # Location for the Let's Encrypt renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other requests to the HTTPS version
    location / {
       return 301 https://$host$request_uri;
    }
}

# This is the main server block that handles your secure site traffic.
server {
    listen 443 ssl;
    server_name qrscanner.innovedu.com;
    client_max_body_size 20M;
    server_tokens off;

    # SSL certificate configuration from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/qrscanner.innovedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrscanner.innovedu.com/privkey.pem;


    # Serve user-uploaded media files directly
    location /media/ {
        alias /media/;
    }

    # Docker's embedded DNS (127.0.0.11) re-resolves "django" on this TTL instead of once
    # at worker startup. Without this, proxy_pass to a bare hostname caches whatever IP the
    # container had when nginx started, and silently 502s with "Connection refused" after the
    # django container gets recreated (deploy, restart, OOM) and is assigned a new IP.
    resolver 127.0.0.11 valid=10s;

    # Pass all other requests to the Django application
    location / {
        set $django_upstream http://django:8000;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
